name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend*.yml"
  push:
    branches:
      - dev
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend*.yml"

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Test
        working-directory: frontend
        run: pnpm test

      - name: Build
        working-directory: frontend
        run: pnpm build
