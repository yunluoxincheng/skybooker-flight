name: Docker Images

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
      - "scripts/deploy.sh"
      - ".github/workflows/docker-images.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra image tag to publish"
        required: false
        type: string

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAMESPACE: ${{ github.repository }}
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  DEFAULT_DEPLOY_BRANCH: main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image_suffix: skybooker-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            cache_scope: backend
          - service: frontend
            image_suffix: skybooker-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            cache_scope: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Docker Hub publishing
        id: dockerhub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          enabled="false"
          if [[ "${GITHUB_EVENT_NAME}" != "pull_request" && -n "${DOCKERHUB_NAMESPACE:-}" ]]; then
            if [[ -n "${DOCKERHUB_USERNAME:-}" && -n "${DOCKERHUB_TOKEN:-}" ]]; then
              enabled="true"
            else
              echo "::notice::DOCKERHUB_NAMESPACE is set, but DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing; Docker Hub publishing will be skipped."
            fi
          fi

          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

      - name: Prepare image tags
        id: image
        shell: bash
        env:
          DOCKERHUB_ENABLED: ${{ steps.dockerhub.outputs.enabled }}
        run: |
          set -euo pipefail

          ghcr_registry="${GHCR_REGISTRY:-ghcr.io}"
          ghcr_namespace="${GHCR_IMAGE_NAMESPACE:-${GITHUB_REPOSITORY}}"
          ghcr_namespace="${ghcr_namespace,,}"
          ghcr_image="${ghcr_registry}/${ghcr_namespace}/${{ matrix.image_suffix }}"

          dockerhub_namespace="${DOCKERHUB_NAMESPACE:-}"
          dockerhub_namespace="${dockerhub_namespace,,}"
          dockerhub_image=""
          if [[ -n "$dockerhub_namespace" ]]; then
            dockerhub_image="${DOCKERHUB_REGISTRY:-docker.io}/${dockerhub_namespace}/${{ matrix.image_suffix }}"
          fi

          sha_tag="sha-${GITHUB_SHA}"

          emit_tags_for_image() {
            local image="$1"
            echo "${image}:${sha_tag}"

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
              echo "${image}:${{ inputs.image_tag }}"
            fi

            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "${DEFAULT_DEPLOY_BRANCH}" ]]; then
              echo "${image}:latest"
            fi

            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi
          }

          {
            echo "image=${ghcr_image}"
            echo "tags<<EOF"
            emit_tags_for_image "$ghcr_image"

            if [[ -n "$dockerhub_image" ]]; then
              if [[ "${DOCKERHUB_ENABLED}" == "true" ]]; then
                emit_tags_for_image "$dockerhub_image"
              fi
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
