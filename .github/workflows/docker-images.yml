name: Docker Images

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
      - ".github/workflows/docker-images.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional extra image tag to publish"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}
  DEFAULT_DEPLOY_BRANCH: main

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image_suffix: skybooker-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            cache_scope: backend
          - service: frontend
            image_suffix: skybooker-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            cache_scope: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image tags
        id: image
        shell: bash
        run: |
          set -euo pipefail

          registry="${REGISTRY:-ghcr.io}"
          namespace="${IMAGE_NAMESPACE:-${GITHUB_REPOSITORY}}"
          namespace="${namespace,,}"
          image="${registry}/${namespace}/${{ matrix.image_suffix }}"
          sha_tag="sha-${GITHUB_SHA}"

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${image}:${sha_tag}"

            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
              echo "${image}:${{ inputs.image_tag }}"
            fi

            if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "${DEFAULT_DEPLOY_BRANCH}" ]]; then
              echo "${image}:latest"
            fi

            if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi

            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
