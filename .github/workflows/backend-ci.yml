name: Backend CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: flight_booking_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p123456"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run test-data tool tests
        run: python3 -m unittest discover -s scripts/tests -v

      - name: Run test-data generation matrix
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          for spec in \
            "all direct" \
            "all refund" \
            "all change" \
            "all waitlist" \
            "all connecting" \
            "flights connecting" \
            "flights direct" \
            "orders direct" \
            "refunds refund" \
            "changes change" \
            "waitlists waitlist" \
            "ai direct"; do
            read -r components scenarios <<< "$spec"
            output="$tmp_dir/${components}-${scenarios}.sql"
            python3 scripts/generate_test_data.py \
              --profile dev --seed 20260707 --base-date 2026-07-07 \
              --components "$components" --scenarios "$scenarios" --output "$output"
            python3 scripts/validate_test_data.py --file "$output"
          done
          for spec in \
            "flights,orders default-flights-orders" \
            "users default-users"; do
            read -r components output_name <<< "$spec"
            output="$tmp_dir/${output_name}.sql"
            python3 scripts/generate_test_data.py \
              --profile dev --seed 20260707 --base-date 2026-07-07 \
              --components "$components" --output "$output"
            python3 scripts/validate_test_data.py --file "$output"
          done
          coverage_sql="$tmp_dir/test-airport-coverage.sql"
          coverage_summary="$tmp_dir/test-airport-coverage.json"
          python3 scripts/generate_test_data.py \
            --profile test --seed 20260707 --base-date 2026-07-07 \
            --components reference,flights --scenarios direct \
            --output "$coverage_sql" --summary-file "$coverage_summary"
          python3 scripts/validate_test_data.py --file "$coverage_sql"
          python3 - "$coverage_summary" <<'PY'
          import json
          import sys

          summary = json.load(open(sys.argv[1], encoding="utf-8"))
          assert summary["airportReferenceCount"] >= 250
          assert summary["airportReferenceCount"] == len(summary["airportCodes"])
          assert summary["flightAirportCount"] == len(summary["flightAirportCodes"])
          assert summary["airportsWithoutOutboundFlights"] == []
          assert summary["airportsWithoutInboundFlights"] == []
          assert summary["airportsWithoutMainlandGateway"] == []
          assert summary["airportsWithOutboundFlights"] == summary["flightAirportCount"]
          assert summary["airportsWithInboundFlights"] == summary["flightAirportCount"]
          assert summary["validation"]["flightCoverageComplete"] is True
          PY

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: 123456
          MYSQL_TEST_DB: flight_booking_test
          JWT_SECRET: test-secret-key-at-least-256-bits-long-for-hmac-sha-algorithm-usage
        run: mvn test

      - name: Run ownership-backed MySQL smoke matrix
        env:
          MYSQL_PASSWORD: 123456
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          ./scripts/test-data.sh seed \
            --dir "$GITHUB_WORKSPACE" --source-dir "$GITHUB_WORKSPACE" \
            --profile dev --components flights --scenarios direct \
            --host 127.0.0.1 --port 3306 --user root --db flight_booking_test --yes
          ./scripts/test-data.sh seed \
            --dir "$GITHUB_WORKSPACE" --source-dir "$GITHUB_WORKSPACE" \
            --profile dev --components orders --scenarios direct \
            --host 127.0.0.1 --port 3306 --user root --db flight_booking_test --yes
          ./scripts/test-data.sh validate \
            --dir "$GITHUB_WORKSPACE" --source-dir "$GITHUB_WORKSPACE" \
            --file "$GITHUB_WORKSPACE/test-data/seed-dev.sql" --database \
            --host 127.0.0.1 --port 3306 --user root --db flight_booking_test
          MYSQL_PWD="$MYSQL_PASSWORD" mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root \
            -D flight_booking_test --batch --skip-column-names \
            -e "UPDATE flight_seat s JOIN test_data_ownership o ON o.batch_key='skybooker:dev' AND o.table_name='flight_seat' AND o.row_id=s.id SET s.status='DISABLED', s.locked_by_order_id=NULL, s.lock_expire_time=NULL WHERE s.status='AVAILABLE';"
          ./scripts/test-data.sh clean \
            --dir "$GITHUB_WORKSPACE" --source-dir "$GITHUB_WORKSPACE" \
            --profile dev --components orders --host 127.0.0.1 --port 3306 \
            --user root --db flight_booking_test --yes
          disabled_seats="$(MYSQL_PWD="$MYSQL_PASSWORD" mysql --protocol=tcp -h 127.0.0.1 -P 3306 -u root \
            -D flight_booking_test --batch --skip-column-names \
            -e "SELECT COUNT(*) FROM flight_seat s JOIN test_data_ownership o ON o.batch_key='skybooker:dev' AND o.table_name='flight_seat' AND o.row_id=s.id WHERE s.status='DISABLED';")"
          test "$disabled_seats" -ge 1
          ./scripts/test-data.sh clean \
            --dir "$GITHUB_WORKSPACE" --source-dir "$GITHUB_WORKSPACE" \
            --profile dev --components users --host 127.0.0.1 --port 3306 \
            --user root --db flight_booking_test --yes
