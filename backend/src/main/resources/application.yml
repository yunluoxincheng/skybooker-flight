server:
  port: 8080

app:
  # 允许跨域的前端 Origin 列表，逗号分隔。开发默认 localhost:3000；
  # 生产通过环境变量 CORS_ALLOWED_ORIGINS 覆盖，例如 https://skybooker.yunluostar.com
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:flight_booking}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&useSSL=${DB_USE_SSL:false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  access-ms: ${JWT_ACCESS_MS:3600000}
  refresh-ms: ${JWT_REFRESH_MS:1209600000}

mail:
  provider: ${MAIL_PROVIDER:log}
  from: ${MAIL_FROM:}
  resend:
    api-key: ${RESEND_API_KEY:}
    base-url: ${RESEND_BASE_URL:https://api.resend.com}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${OPENAPI_ENABLED:false}
  api-docs:
    path: /v3/api-docs
    enabled: ${OPENAPI_ENABLED:false}

ai:
  # 后台管理 LLM apiKey 的 AES-256 加密密钥（base64 编码 32 字节）。
  # 缺失或格式非法时加密不可用，但应用仍可启动并走环境变量 fallback；仅管理员写入后台配置时才报错。
  config-enc-key: ${AI_CONFIG_ENC_KEY:}
  llm:
    enabled: ${AI_LLM_ENABLED:false}
    base-url: ${AI_LLM_BASE_URL:}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:}
    timeout-ms: ${AI_LLM_TIMEOUT_MS:8000}
    max-retries: ${AI_LLM_MAX_RETRIES:1}
