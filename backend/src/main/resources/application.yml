server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:flight_booking}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=${DB_ALLOW_PUBLIC_KEY_RETRIEVAL:true}&useSSL=${DB_USE_SSL:false}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jpa:
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:7200000}

mail:
  provider: ${MAIL_PROVIDER:log}
  from: ${MAIL_FROM:}
  resend:
    api-key: ${RESEND_API_KEY:}
    base-url: ${RESEND_BASE_URL:https://api.resend.com}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${OPENAPI_ENABLED:false}
  api-docs:
    path: /v3/api-docs
    enabled: ${OPENAPI_ENABLED:false}

ai:
  llm:
    enabled: ${AI_LLM_ENABLED:false}
    base-url: ${AI_LLM_BASE_URL:}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:}
    timeout-ms: ${AI_LLM_TIMEOUT_MS:8000}
    max-retries: ${AI_LLM_MAX_RETRIES:1}
