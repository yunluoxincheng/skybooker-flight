server {
    listen 80;
    server_name _;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /api {
        proxy_pass http://backend:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root path is an API-only entry point. The local development compose intentionally does not
    # package the frontend here, so developers keep `pnpm dev` hot reload. For a full-stack UI
    # (deployment verification / demo), run scripts/deploy.sh, which prepares the production
    # compose (deploy/docker-compose.prod.yml) and nginx config automatically.
    location / {
        add_header Content-Type text/plain;
        return 200 "SkyBooker API gateway is running (local development compose).\n\nThe root path is an API-only entry; the frontend UI is not served here.\n- API / health check: /api/** and /healthz\n- Frontend dev (hot reload): cd frontend && pnpm dev -> http://localhost:3000\n- Full-stack UI (production-like): run scripts/deploy.sh (see docs/11_DEPLOYMENT_GUIDE.md)\n";
    }
}
